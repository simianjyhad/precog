# ============================================================================
# Precog Configuration File
# ============================================================================
# This file controls Precog's alert thresholds, watched keywords, and
# terminal output colors.

# ----------------------------------------------------------------------
[thresholds]
# ----------------------------------------------------------------------
# Controls the alert tier thresholds. These values match what's currently
# hardcoded in core/alert.py (DEFAULT_THRESHOLDS) and confirmed working
# live in v14 (Pattern Watch firing correctly at 3-in-10-minutes).
#
# tier1 (Pattern Watch)  - low urgency, requires repetition before firing
# tier2 (Correlation)    - medium urgency, related entries close together
# tier3 (Triage)         - urgent, fires immediately on critical keywords

tier1_pattern_watch_count  = 3
tier1_pattern_watch_window = 600
tier1_pattern_watch_samples = 5
tier2_correlation_count    = 2
tier2_correlation_window   = 300
tier2_correlation_samples   = 3
tier3_triage_count         = 1

# ----------------------------------------------------------------------
[keywords]
# ----------------------------------------------------------------------
# Externalizes DEFAULT_KEYWORDS (core/baseline.py) and CRITICAL_KEYWORDS
# (precog.py), currently hardcoded. Comma-separated, case-insensitive
# matching assumed (matches existing hardcoded behavior).
#
# These are starting-point defaults, not fixed truth — every system's
# normal log chatter is different. Expect to prune, add, or reweight
# these for your own machine once flagged.log has enough real history
# to judge by, rather than treating this list as authoritative as-shipped.
#
# NOTE - KNOWN ISSUE, NOT YET RESOLVED:
# "failed" and "timeout" below are noisy - they catch a lot of routine
# boot/resume chatter (bluetooth, NetworkManager dhcp, fwupd-refresh)
# that isn't actually a problem. This is the same false-positive shape
# as the oom-kill issue that was already fixed. Left in as-is for now
# since removing/narrowing them is a decision still pending, not a
# side effect of moving these into config - see next-session notes.

critical = oom-kill, out of memory, segfault, segmentation fault, corrupted, no space left, disk full

watched  = buffer overrun, buffer overflow, disk full, no space left, oom-kill, killed process, out of memory, authentication failure, failed password, segfault, segmentation fault, i/o error, error, errno, timeout, corrupted, critical, failed

# ----------------------------------------------------------------------
[colors]
# ----------------------------------------------------------------------
# Color codes for terminal output.
# Each entry accepts EITHER a name OR a hex code - pick whichever format
# you're comfortable with on a given line, they can be mixed.
#   Names: black, red, green, yellow, blue, magenta, cyan, white
#   Hex:   #RRGGBB (e.g. #FF8800)
#
# HOW TO SWITCH PALETTES:
# Only ONE section below should be active (uncommented) at a time.
# To switch, comment out the active section's lines (add # to the start
# of each) and uncomment the section you want instead (remove the #).

# --- DEFAULT (normal color vision) -----------------------------------
base_system   = white
boot_entry    = blue
tier1_pattern = yellow
tier2_corr    = magenta
tier3_triage  = red

# --- DEUTERANOPIA / PROTANOPIA (red-green colorblindness, most common) -
# base_system   = white
# boot_entry    = #0072B2
# tier1_pattern = #F0E442
# tier2_corr    = #E69F00
# tier3_triage  = #D55E00

# --- TRITANOPIA (blue-yellow colorblindness, rarer) --------------------
# base_system   = white
# boot_entry    = #CC79A7
# tier1_pattern = #56B4E9
# tier2_corr    = #009E73
# tier3_triage  = #D55E00

# --- MAXIMUM CONTRAST (for difficulty distinguishing similar hues or
#     shades, whether from colorblindness, low vision, or display
#     limitations) ---------------------------------------------------
# base_system   = white
# boot_entry    = #404040
# tier1_pattern = #FFFFFF
# tier2_corr    = #808080
# tier3_triage  = #000000

# ----------------------------------------------------------------------
[retention]
# ----------------------------------------------------------------------
# How long flagged entries stay in the live flagged.log before being
# moved to flagged_archive.log. Nothing is discarded — just relocated,
# keeping the live file lean without losing history. Adjust lower for
# noisier systems / less desired history, or higher to keep more in
# the live file before it gets archived.
flagged_log_cutoff_days = 7


# ----------------------------------------------------------------------
[keyword_exclusions]
# ----------------------------------------------------------------------
# Optional. If a keyword below is matched AND the exclusion phrase is
# also present in the same log line, the match is skipped entirely.
# Used for keywords that match harmless boilerplate phrasing alongside
# genuine problems (e.g. "timeout" appearing in NetworkManager's normal
# "beginning transaction (timeout in 45 seconds)" status message, which
# describes a time budget, not an actual failure).
timeout = beginning transaction (timeout in


# ----------------------------------------------------------------------
[noisy_keywords]
# ----------------------------------------------------------------------
# Optional. Keywords listed here get their OWN, separate threshold
# instead of the standard Pattern Watch tier (3 of 5 within 10 minutes).
# Format: keyword = required_count, window_seconds
#
# Use this for keywords that are individually meaningful but tend to
# recur frequently as routine noise (boot chatter, resume cycles, etc.)
# — requiring many more hits over a longer window before they earn a
# flag, without changing the threshold for every other watched keyword.
#
# Example: require 10 hits within 1 hour (3600 seconds) before "failed"
# or "timeout" fire, instead of the standard 3-of-5-within-10-minutes.
failed  = 10, 3600
timeout = 10, 3600
